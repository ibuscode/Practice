<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Payment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <div class="card mx-auto" style="max-width:500px">
    <div class="card-body">
      <h5>Quote Amount: ₹5,800</h5>
      <p>Policy: Two Wheeler Pro</p>
      <hr>
      <button class="btn btn-success w-100" id="payBtn">Pay Now (Demo)</button>
    </div>
  </div>
</div>
<script>
  document.getElementById("payBtn")?.addEventListener("click",()=>{
    alert("Payment successful! Policy status changed to ACTIVE. Policy document emailed.");
    window.location.href="dashboard.html";
  });
</script>
</body>
</html>
