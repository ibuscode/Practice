<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Proposal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h3>Submit Vehicle Insurance Proposal</h3>
  <form id="proposalForm" class="card p-4 shadow-sm">
    <div class="mb-2"><label>Vehicle Type</label><select class="form-select" required><option>Truck</option><option>Motorcycle</option><option>Camper Van</option></select></div>
    <div class="mb-2"><label>Vehicle Reg No</label><input class="form-control" placeholder="KA01AB1234" required></div>
    <div class="mb-2"><label>Add-ons</label><div><input type="checkbox"> Zero Depreciation &nbsp;<input type="checkbox"> Roadside Assistance</div></div>
    <button type="submit" class="btn btn-primary mt-3">Submit Proposal</button>
  </form>
</div>
<script>
  document.getElementById("proposalForm")?.addEventListener("submit", (e) => {
    e.preventDefault();
    alert("Proposal submitted! Status: Proposal Submitted. Officer will review.");
    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>
