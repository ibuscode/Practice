<!DOCTYPE html>
<html lang="en">
<head>
  <title>Proposal Review</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <div class="card p-4">
    <h4>Proposal #P101 - Truck Insurance</h4>
    <p><strong>Applicant:</strong> Ramesh Kumar | Vehicle: Truck | Add-ons: Zero Dep</p>
    <hr>
    <label>Request more documents / Approve</label>
    <div class="mt-3">
      <button class="btn btn-warning me-2" id="requestDocsBtn">Request Additional Info</button>
      <button class="btn btn-success" id="approveGenQuote">Approve & Generate Quote</button>
    </div>
  </div>
</div>
<script>
  document.getElementById("requestDocsBtn")?.addEventListener("click",()=>alert("Request sent: Please submit RC & fitness certificate."));
  document.getElementById("approveGenQuote")?.addEventListener("click",()=>{
    alert("Proposal Approved! Quote generated (₹9,200). Email sent to user for payment.");
    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>
