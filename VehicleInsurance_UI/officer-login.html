<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officer Login | AutoInsure</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
    }
    .login-card {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5">
      <div class="login-card p-4">
        <div class="text-center mb-4">
          <i class="fas fa-user-tie fa-3x text-success"></i>
          <h3 class="fw-bold mt-2">Officer Login</h3>
          <p class="text-muted">Insurance team portal</p>
        </div>
        
        <form id="officerLoginForm">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="officerEmail" class="form-control" placeholder="officer@autoinsure.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="officerPassword" class="form-control" placeholder="••••••" required>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2">Login as Officer</button>
        </form>
        
        <hr>
        <div class="text-center">
          <span>New officer? </span>
          <a href="officer-register.html" class="text-decoration-none fw-bold">Register as Officer</a>
        </div>
        <div class="text-center mt-3">
          <a href="index.html" class="text-muted">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById("officerLoginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const email = document.getElementById("officerEmail").value;
    // Store officer info
    localStorage.setItem("currentUser", JSON.stringify({ name: "Officer", email: email, role: "officer" }));
    localStorage.setItem("isLoggedIn", "true");
    window.location.href = "officer/dashboard.html";
  });
</script>
</body>
</html>
