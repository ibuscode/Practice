<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Registration | AutoInsure</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .register-card {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center align-items-center min-vh-100 py-4">
    <div class="col-md-6">
      <div class="register-card p-4">
        <div class="text-center mb-4">
          <i class="fas fa-user-plus fa-3x text-primary"></i>
          <h3 class="fw-bold mt-2">Customer Registration</h3>
          <p class="text-muted">Create your insurance account</p>
        </div>
        
        <form id="userRegisterForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Full Name *</label>
              <input type="text" id="fullName" class="form-control" placeholder="Enter full name" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Date of Birth *</label>
              <input type="date" id="dob" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Email *</label>
              <input type="email" id="email" class="form-control" placeholder="customer@example.com" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Phone Number *</label>
              <input type="tel" id="phone" class="form-control" placeholder="9876543210" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Aadhaar Number *</label>
              <input type="text" id="aadhaar" class="form-control" placeholder="12-digit number" maxlength="12">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">PAN Number</label>
              <input type="text" id="pan" class="form-control" placeholder="ABCDE1234F">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Address *</label>
              <textarea id="address" class="form-control" rows="2" placeholder="Enter your address"></textarea>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Password *</label>
              <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Confirm Password *</label>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Register as Customer</button>
        </form>
        
        <hr>
        <div class="text-center">
          <span>Already have an account? </span>
          <a href="user-login.html" class="text-decoration-none fw-bold">Login here</a>
        </div>
        <div class="text-center mt-2">
          <a href="index.html" class="text-muted small">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById("userRegisterForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    
    if (password !== confirm) {
      alert("❌ Passwords do not match!");
      return;
    }
    
    if (password.length < 6) {
      alert("❌ Password must be at least 6 characters!");
      return;
    }
    
    const userData = {
      name: document.getElementById("fullName").value,
      email: document.getElementById("email").value,
      role: "user",
      phone: document.getElementById("phone").value
    };
    
    localStorage.setItem("currentUser", JSON.stringify(userData));
    localStorage.setItem("isLoggedIn", "true");
    
    alert("✅ Registration successful! Redirecting to dashboard...");
    window.location.href = "user/dashboard.html";
  });
</script>
</body>
</html>
